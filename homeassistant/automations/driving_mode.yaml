- id: '1778470359766'
  alias: Driving Mode
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.drive_mode
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.drive_mode
        state: 'on'
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.kismet_service
      - action: automation.turn_off
        target:
          entity_id:
          - automation.indoor_lights_off_when_cell_exits_zone
          - automation.indoor_lights_on_when_cell_enters_zone
          - automation.save_image_of_movement
        data:
          stop_actions: true
    default:
    - action: switch.turn_off
      target:
        entity_id: switch.kismet_service
    - action: automation.turn_on
      target:
        entity_id:
        - automation.indoor_lights_off_when_cell_exits_zone
        - automation.indoor_lights_on_when_cell_enters_zone
        - automation.save_image_of_movement
  - action: light.turn_off
    metadata: {}
    target:
      entity_id:
      - light.smart_wi_fi_rgbw
      - light.smart_wi_fi_dimmer
    data: {}
  mode: single
- id: '1778475620303'
  alias: Driving Detection
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.gps_127_0_0_1_speed
    above: 1
    for:
      hours: 0
      minutes: 0
      seconds: 1
  conditions: []
  actions:
  - action: input_boolean.turn_on
    metadata: {}
    target:
      entity_id: input_boolean.drive_mode
    data: {}
  mode: single
- id: '1778476309113'
  alias: Parking Detection
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.gps_127_0_0_1_speed
    for:
      hours: 0
      minutes: 2
      seconds: 0
    below: 1
  conditions: []
  actions:
  - action: input_boolean.turn_off
    metadata: {}
    target:
      entity_id: input_boolean.drive_mode
    data: {}
  mode: single
