- id: '1778296920364'
  alias: Indoor lights on when cell enters zone
  description: ''
  triggers:
  - device_id: 39d762b13da1afe576d3e4a4be1aad13
    domain: device_tracker
    entity_id: 659ae8ed37354adafa6ff4b79be885da
    type: enters
    trigger: device
    zone: zone.home
  conditions: []
  actions:
  - action: light.turn_on
    metadata: {}
    target:
      entity_id: light.smart_wi_fi_rgbw
    data:
      brightness_pct: 100
      white: true
  mode: single
- id: '1778297141070'
  alias: Indoor lights off when cell exits zone
  description: ''
