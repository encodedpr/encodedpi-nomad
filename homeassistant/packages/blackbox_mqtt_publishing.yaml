mqtt_statestream:
  base_topic: blackbox
  publish_attributes: false
  publish_timestamps: false
  include:
    entities:
      - sensor.skynet_mirror_heartbeat
      - sensor.skynet_mirror_gps_latitude
      - sensor.skynet_mirror_gps_longitude
      - sensor.skynet_mirror_gps_speed
      - sensor.skynet_mirror_gps_elevation
      - sensor.skynet_mirror_gps_mode
      - sensor.skynet_mirror_gps_used_satellites
      - sensor.skynet_mirror_battery_soc
      - sensor.skynet_mirror_battery_voltage
      - sensor.skynet_mirror_battery_power
      - sensor.skynet_mirror_battery_runtime
      - sensor.skynet_mirror_power_consumption
      - sensor.skynet_mirror_solar_power
      - sensor.skynet_mirror_shore_power
      - sensor.skynet_mirror_dc_dc_power
      - sensor.skynet_mirror_starlink_ping
      - sensor.skynet_mirror_starlink_ping_drop_rate
      - sensor.skynet_mirror_battery_alarm_reason
      - sensor.skynet_mirror_mppt_charger_error
      - sensor.skynet_mirror_dc_dc_charger_error
      - sensor.skynet_mirror_shore_charger_error
      - sensor.skynet_mirror_living_temperature
      - sensor.skynet_mirror_living_humidity
      - sensor.skynet_mirror_cabin_temperature
      - sensor.skynet_mirror_cabin_humidity
      - sensor.skynet_mirror_sink_temperature
      - sensor.skynet_mirror_sink_humidity
      - sensor.skynet_mirror_outdoor_temperature
      - sensor.skynet_mirror_outdoor_humidity
      - sensor.skynet_mirror_equipment_temperature
      - sensor.skynet_mirror_equipment_humidity
      - sensor.skynet_mirror_router_cpu_temperature
      - sensor.skynet_mirror_router_memory_usage
      - sensor.skynet_mirror_router_uptime
      - sensor.skynet_mirror_encodedpi_processor_temperature
      - sensor.skynet_mirror_encodedpi_memory_usage
      - sensor.skynet_mirror_encodedpi_disk_free
      - binary_sensor.any_battery_problem
      - binary_sensor.battery_shunt_charging
      - binary_sensor.rpi_power_status
      - sensor.current_city
      - sensor.current_state
      - sensor.current_street
      - binary_sensor.starlink_connectivity
      - binary_sensor.starlink_obstructed
      - binary_sensor.starlink_thermal_throttle
