ffmpeg:

binary_sensor:
  - platform: ffmpeg_motion
    name: MJPEG Motion
    input: >-
      -reconnect 1
      -reconnect_streamed 1
      -reconnect_delay_max 10
      -f mjpeg
      -i http://encodedpi:8090
    changes: 1        # Percentage of frame that must change to trigger
    reset : 1           # Seconds to wait after motion stops

# ===============================
# Integral Sensor (Power + Energy)
# ===============================
