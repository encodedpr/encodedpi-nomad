  - button:
      - name: Restart MJPEG Camera
        press:
          action: shell_command.restart_mjpeg_camera

      - name: Restart Security Feed
        press:
          action: shell_command.restart_security_feed

      - name: Reboot Pi
        press:
          action: shell_command.reboot_encodedpi

  # -----------------------
  # Triggered Sensors: Aurora + K Index
  # -----------------------
  - trigger:

      - platform: state
        entity_id:
          - sensor.noaa_aurora_raw
          - zone.home

    sensor:

      - name: "Aurora Probability"
        unique_id: aurora_probability_home_zone
        state: >
          {% set coords = state_attr('sensor.noaa_aurora_raw', 'coordinates') %}
          {% set lat = state_attr('zone.home', 'latitude') | float(0) %}
          {% set lon = state_attr('zone.home', 'longitude') | float(0) %}

          {% if coords is not iterable or coords|length == 0 %}
            unavailable
          {% else %}
            {% set ns = namespace(min=9e99, best=None) %}
            {% set step = (coords|length // 500) if coords|length > 500 else 1 %}
            {% for i in range(0, coords|length, step) %}
              {% set c = coords[i] %}
              {% if c is iterable and c|length >= 3 %}
                {% set dist = ((c[1] - lat)**2 + (c[0] - lon)**2) %}
                {% if dist < ns.min %}
                  {% set ns.min = dist %}
                  {% set ns.best = c[2] %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ (ns.best * 100)|round(1) if ns.best is not none else 'unavailable' }}
          {% endif %}
        unit_of_measurement: "%"
        state_class: measurement
        attributes:
          source: "NOAA OVATION"
          home_lat: "{{ state_attr('zone.home','latitude') }}"
          home_lon: "{{ state_attr('zone.home','longitude') }}"

  # -----------------------
  # Regular Template Sensors
  # -----------------------
  - sensor:
      - name: "Raspberry Pi Estimated Power"
        unique_id: raspberry_pi_estimated_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set cpu = [states('sensor.system_monitor_processor_use') | float(0), 100] | min %}
          {% set freq = states('sensor.cpu_frequency') | float(1500) %}

          {% set P_idle = 4 %}
          {% set P_max = 10 %}

          {# CPU load factor #}
          {% set cpu_factor = cpu / 100 %}

          {# Frequency factor (600–2500 MHz typical Pi5 range) #}
          {% set freq_factor = (freq - 600) / (2500 - 600) %}
          {% set freq_factor = freq_factor if freq_factor > 0 else 0 %}
          {% set freq_factor = freq_factor if freq_factor < 1 else 1 %}

          {# Combined load #}
          {% set load = cpu_factor * 0.7 + freq_factor * 0.3 %}

          {{ (P_idle + (P_max - P_idle) * load) | round(2) }}

      - name: "Current Full Address"
        state: >
          {% set raw = states('sensor.home_location_nominatim') %}
          {% set addr = state_attr('sensor.home_location_nominatim','address') %}
          {% if addr is mapping %}
            {{ raw }}
          {% else %}
            unknown
          {% endif %}
        icon: mdi:home-map-marker

      - name: "Current City"
        state: >
          {% set addr = state_attr('sensor.home_location_nominatim','address') %}
          {% if addr is mapping %}
            {{ addr.city|default(addr.town)|default(addr.village)|default('unknown') }}
          {% else %}
            unknown
          {% endif %}
        icon: mdi:city

      - name: "Current County"
        state: >
          {% set addr = state_attr('sensor.home_location_nominatim','address') %}
          {% if addr is mapping %}
            {{ addr.county|default(addr.state_district)|default('unknown') }}
          {% else %}
            unknown
          {% endif %}
        icon: mdi:map

      - name: "Current State"
        state: >
          {% set addr = state_attr('sensor.home_location_nominatim','address') %}
          {% if addr is mapping %}
            {{ addr.state|default('unknown') }}
          {% else %}
            unknown
          {% endif %}
        icon: mdi:map-marker-radius

      - name: "Current Street"
        state: >
          {% set addr = state_attr('sensor.home_location_nominatim','address') %}
          {% if addr is mapping %}
            {{ addr.road|default(addr.pedestrian)|default('unknown') }}
          {% else %}
            unknown
          {% endif %}
        icon: mdi:road

      - name: "Current Latitude"
        state: "{{ state_attr('zone.home','latitude') }}"
        icon: mdi:map

      - name: "Current Longitude"
        state: "{{ state_attr('zone.home','longitude') }}"
        icon: mdi:map

      - name: "Current Elevation"
        unit_of_measurement: "m"
        state: >
          {% set ele = state_attr('zone.home', 'elevation') %}
          {% if ele is number %}
            {{ ele }}
          {% elif ele is string %}
            {{ ele|float(0) }}
          {% else %}
            {{ none }}
          {% endif %}
        icon: mdi:map


  # Van Command dashboard derived status sensors.
  - sensor:
      - name: "Van Power Mode"
        unique_id: van_power_mode
        icon: mdi:transmission-tower
        state: >
          {% set shore = states('sensor.shore_power_30a_output_power_1') | float(0) %}
          {% set solar = states('sensor.mppt_70_power') | float(0) %}
          {% set battery = states('sensor.battery_shunt_power') | float(0) %}
          {% if is_state('binary_sensor.any_battery_problem', 'on') %}
            Battery Alert
          {% elif shore > 25 %}
            Shore Power
          {% elif is_state('binary_sensor.battery_shunt_charging', 'on') %}
            Charging
          {% elif solar > 25 %}
            Solar Assist
          {% elif battery < -25 %}
            Battery
          {% else %}
            Idle
          {% endif %}
      - name: "Van Net Power Balance"
        unique_id: van_net_power_balance
        icon: mdi:scale-balance
        device_class: power
        state_class: measurement
        unit_of_measurement: W
        state: >
          {{ (
            states('sensor.mppt_70_power') | float(0)
            + states('sensor.shore_power_30a_output_power_1') | float(0)
            + states('sensor.dc_dc_xs_output_power') | float(0)
            - states('sensor.power_consumption') | float(0)
          ) | round(1) }}
      - name:  Van Equipment Health
        unique_id: van_equipment_health
        icon: mdi:heart-pulse
        state: >
          {% set shunt = states('sensor.battery_shunt_alarm_reason') %}
          {% set mppt = states('sensor.mppt_solar_charger_error') %}
          {% set shore = states('sensor.shore_power_30a_charger_error') %}
          {% if is_state('binary_sensor.any_battery_problem', 'on')
                or is_state('binary_sensor.rpi_power_status', 'on')
                or is_state('binary_sensor.starlink_thermal_throttle', 'on')
                or shunt not in ['no_alarm', 'unknown', 'unavailable', '']
                or mppt not in ['no_error', 'unknown', 'unavailable', '']
                or shore not in ['no_error', 'unknown', 'unavailable', ''] %}
            Attention
          {% else %}
            Normal
          {% endif %}
      - name: "Van Location Summary"
        unique_id: van_location_summary
        icon: mdi:map-marker
        state: >
          {% set street = states('sensor.current_street') %}
          {% set city = states('sensor.current_city') %}
          {% set region = states('sensor.current_state') %}
          {{ [street, city, region] | reject('in', ['unknown', 'unavailable', '']) | join(', ') }}
  - binary_sensor:
      - name: "Van Internet Healthy"
        unique_id: van_internet_healthy
        device_class: connectivity
        icon: mdi:satellite-uplink
        state: >
          {{ is_state('binary_sensor.starlink_connectivity', 'on')
             and not is_state('binary_sensor.starlink_obstructed', 'on')
             and not is_state('binary_sensor.starlink_thermal_throttle', 'on')
             and states('sensor.starlink_ping') | float(9999) < 200
             and states('sensor.starlink_ping_drop_rate') | float(100) < 20 }}
      - name: "Van Climate Alert"
        unique_id: van_climate_alert
        device_class: problem
        icon: mdi:thermometer-alert
        state: >
          {% set temps = [
            states('sensor.meter_1c97_temperature') | float(70),
            states('sensor.meter_3732_temperature') | float(70),
            states('sensor.sink_temperature') | float(70),
            states('sensor.meter_b62a_temperature') | float(70)
          ] %}
          {% set humidity = [
            states('sensor.meter_1c97_humidity') | float(40),
            states('sensor.meter_3732_humidity') | float(40),
            states('sensor.sink_humidity') | float(40),
            states('sensor.meter_b62a_humidity') | float(40)
          ] %}
          {{ temps | max > 120 or temps | min < 35 or humidity | max > 80 }}
      - name: "Van Power Alert"
        unique_id: van_power_alert
        device_class: problem
        icon: mdi:battery-alert
        state: >
          {{ is_state('binary_sensor.any_battery_problem', 'on')
             or states('sensor.battery_shunt_battery') | float(100) < 15
             or states('sensor.battery_shunt_voltage') | float(14) < 11.8
             or states('sensor.battery_shunt_alarm_reason') not in ['no_alarm', 'unknown', 'unavailable'] }}

# ===============================
# Curated low-bandwidth Black Box feed
