template:
  - sensor:
      - name: "Van Internet ISP"
        unique_id: van_internet_isp
        icon: mdi:wan
        state: >
          {% if is_state('binary_sensor.van_internet_healthy', 'on') %}
            {% set isp = states('sensor.ip_info') %}
            {{ isp if isp not in ['unknown', 'unavailable', ''] else 'Connected' }}
          {% else %}
            Disconnected
          {% endif %}
