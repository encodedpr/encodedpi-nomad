default_config:

homeassistant:
  name: EncodedPi Black Box
  time_zone: America/New_York

# This instance is intentionally read-only. Mirrored entities arrive through
# MQTT discovery as sensors and cannot send commands to the source HA.
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.19.0.1
  ip_ban_enabled: true
  login_attempts_threshold: 5

recorder:
  purge_keep_days: 30
  auto_purge: true

logger:
  default: warning
  logs:
    homeassistant.components.mqtt: info
